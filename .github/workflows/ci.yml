name: CI

on:
  push:
    branches: [main, checkpoint-2]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL_TEST: postgres://taskflow:testpassword@localhost:5432/taskflow_test
          JWT_SECRET: ci-test-secret-not-for-production-64-chars-padding-here-1234
          BCRYPT_ROUNDS: '1'
        run: npm test

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t taskflow:${{ github.sha }} .
